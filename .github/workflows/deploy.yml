name: Publish

on:
  release:
    types: [published]

permissions:
  id-token: write # to enable use of OIDC for npm provenance
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm install --ignore-scripts
      - run: npm publish
